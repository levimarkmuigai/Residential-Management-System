<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caretaker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/caretaker.css"/>
</head>
<body>

  <div class="container">
    <header class="stats-header">
        <button class="header-btn urgent" id="urgent-btn">
            URGENT: <span>--</span>
        </button>

        <button class="header-btn tasks" id="tasks-btn">
            TASKS: <span>--</span>
        </button>

        <button class="header-btn vacancies"> VACANCIES: <span>--</span></button>

        <button class="header-btn profile" id="profile-btn">PROFILE</button>
    </header>

    <div id="workstation-urgent" class="workstation hidden">
        <h2 class="red-text"> URGENT TASKS </h2>
        <table>
            <thead>
                <tr>
                    <th>UNIT</th>
                    <th>TENANT</th>
                    <th>DESCRIPTIOM</th>
                    <th>TIMESTAMP</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody>
                {{urgent_rows}}
            </tbody>
        </table>
    </div>

      <div id="workstation-tasks" class="workstation hidden">
        <h2> PENDING TASKS </h2>
        <table>
            <thead>
                <tr>
                    <th>UNIT</th>
                    <th>TENANT</th>
                    <th>DESCRIPTIOM</th>
                    <th>TIMESTAMP</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody>
                {{tasks_rows}}
            </tbody>
        </table>
    </div>

     <section class="profile-panel hidden" id="profile-section">
      <h3> FILL IN WITH CORRECT DETAILS </h3>
      <form action="/caretaker-form" method="POST">
        <div class="grid-field">
          <div class="field">
            <label>NATIONAL ID</label>
            <input type="text" name="national_id" value="">
          </div>
          <div class="field">
            <label>HIRED IN</label>
            <input type="date" name="hired_at">
          </div>
        </div>
        <button type="submit" class="btn-profile">UPDATE</button>
      </form>
    </section>

    <h2>ADMINISTRATION</h2>
    <div class="admin-grid">
        <div class="management-section">
            <h3>ASSIGN UNIT</h3>
            <form action="/caretaker/assign_tenant" method="POST">
            {{assign_rows}}
                <button type="submit" class="submit-btn">ASSIGN TENANT TO UNIT</button>
            </form>
        </div>

        <div class="management-section notices">
            <h3>VACATION NOTICES</h3>
            <table class="notice-table">
                <thead>
                    <tr>
                        <th>TENANT</th>
                        <th>UNIT</th>
                        <th>EXIT DATE</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody>
                    {{notice_rows}}
                </tbody>
            </table>
        </div>
    </div>
 
  <script>
    const setupToggle = (btnId, sectionId) => {
        const btn = document.getElementById(btnId);
        const section = document.getElementById(sectionId);

        btn.addEventListener('click', () => {
            document.querySelectorAll('.workstation, .profile-panel').forEach(s => {
                if(s !== section) s.classList.add('hidden');
            });
            section.classList.toggle('hidden');
        });
    };

    setupToggle('profile-btn', 'profile-section');
    setupToggle('urgent-btn', 'workstation-urgent');
    setupToggle('tasks-btn', 'workstation-tasks');
  </script>
</body>
</html>
